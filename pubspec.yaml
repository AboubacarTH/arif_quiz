name: arif_quiz
description: A modern Quiz App with Laravel backend
publish_to: 'none'
version: 1.0.5+17

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & Networking
  dio: ^5.4.0
  pretty_dio_logger: ^1.3.1

  # State Management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.5

  # Dependency Injection
  get_it: ^9.2.1

  # Local Storage
  flutter_secure_storage: ^10.3.1
  shared_preferences: ^2.5.5

  # UI
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  lottie: ^3.1.0
  fl_chart: ^1.2.0
  percent_indicator: ^4.2.3
  flutter_svg: ^2.0.10+1

  # Social & Sharing
  share_plus: ^10.0.0
  path_provider: ^2.1.5

  # Monétisation — Publicités & Abonnements
  google_mobile_ads: ^5.3.0
  in_app_purchase: ^3.2.0

  # Push notifications (rappel défi du jour)
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

  # Animations
  confetti: ^0.7.0

  # File picker (admin Excel import)
  file_picker: ^8.0.0

  # Utilities
  intl: ^0.20.2
  timeago: ^3.6.1
  connectivity_plus: ^7.1.1
  auto_size_text: ^3.0.0
  audioplayers: ^6.8.1

  # Internationalisation (UI multilingue en/fr/ar/es)
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  fake_async: ^1.3.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/arifquiz_512.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0D0D1A"
  adaptive_icon_foreground: "assets/images/arifquiz_512.png"

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/fonts/
  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-Regular.ttf
        - asset: assets/fonts/Nunito-Bold.ttf
          weight: 700
        - asset: assets/fonts/Nunito-ExtraBold.ttf
          weight: 800
